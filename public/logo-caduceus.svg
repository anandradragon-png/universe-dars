<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1a4e"/>
      <stop offset="70%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="goldWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="snake1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4a0f0"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
    <linearGradient id="snake2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle star field -->
  <circle cx="80" cy="90" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="420" cy="70" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="60" cy="380" r="1.2" fill="#fff" opacity="0.35"/>
  <circle cx="440" cy="350" r="1" fill="#fff" opacity="0.25"/>
  <circle cx="150" cy="50" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="380" cy="440" r="1.3" fill="#fff" opacity="0.3"/>
  <circle cx="100" cy="200" r="0.7" fill="#fff" opacity="0.2"/>
  <circle cx="400" cy="180" r="0.9" fill="#fff" opacity="0.25"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.1"/>

  <!-- Central staff -->
  <line x1="256" y1="95" x2="256" y2="430" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Staff orb at top -->
  <circle cx="256" cy="90" r="14" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="256" cy="90" r="8" fill="#FFE44D" opacity="0.6"/>

  <!-- Wings (left) -->
  <path d="M242 115 C220 100, 160 85, 120 95 C140 100, 165 110, 185 120 C165 108, 130 100, 100 105 C130 115, 165 125, 200 130 C175 122, 145 118, 115 120 C145 128, 180 135, 215 138"
        fill="none" stroke="url(#goldWing)" stroke-width="3" opacity="0.8" filter="url(#glow)"/>

  <!-- Wings (right) -->
  <path d="M270 115 C292 100, 352 85, 392 95 C372 100, 347 110, 327 120 C347 108, 382 100, 412 105 C382 115, 347 125, 312 130 C337 122, 367 118, 397 120 C367 128, 332 135, 297 138"
        fill="none" stroke="url(#goldWing)" stroke-width="3" opacity="0.8" filter="url(#glow)"/>

  <!-- Left snake (purple - spiritual) -->
  <path d="M256 400
           C220 380, 180 360, 180 330
           C180 300, 230 290, 256 270
           C220 260, 180 240, 180 210
           C180 180, 230 170, 256 150"
        fill="none" stroke="url(#snake1)" stroke-width="10" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
  <!-- Left snake head -->
  <circle cx="246" cy="148" r="8" fill="#c4a0f0" opacity="0.9"/>
  <circle cx="243" cy="145" r="2.5" fill="#fff" opacity="0.8"/>

  <!-- Right snake (orange - fire) -->
  <path d="M256 400
           C292 380, 332 360, 332 330
           C332 300, 282 290, 256 270
           C292 260, 332 240, 332 210
           C332 180, 282 170, 256 150"
        fill="none" stroke="url(#snake2)" stroke-width="10" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
  <!-- Right snake head -->
  <circle cx="266" cy="148" r="8" fill="#FF8C00" opacity="0.9"/>
  <circle cx="269" cy="145" r="2.5" fill="#fff" opacity="0.8"/>

  <!-- Bottom orb -->
  <circle cx="256" cy="430" r="10" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Text "YupDar" -->
  <text x="256" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#D4AF37" letter-spacing="4" filter="url(#glow)">YupDar</text>
</svg>
