name: Deploy YupDar

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Автопростановка версии кэша на КАЖДОМ деплое. Раньше номер версии
      # (BUILD + version.txt + все ?v= токены) правился руками в трёх местах —
      # легко забыть одно, и тогда обновление «не доходит» до тестеров. Теперь
      # уникальная версия (дата + хэш коммита) проставляется автоматически и
      # коммитится ДО того, как сервер заберёт код через git pull.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump cache-busting version
        run: |
          NEW_VER="$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          echo "Новая версия кэша: $NEW_VER"
          # version.txt — источник правды для самолечения версии в браузере
          echo "$NEW_VER" > public/version.txt
          # Константа BUILD в index.html (с ней сверяется самолечение)
          sed -i -E "s/var BUILD = '[^']*';/var BUILD = '${NEW_VER}';/" public/index.html
          # Все токены ?v= у локальных ассетов (js/css) в index.html
          sed -i -E "s/(href|src)=\"([^\"]+)\?v=[^\"]*\"/\1=\"\2?v=${NEW_VER}\"/g" public/index.html
          git config user.name "yupdar-deploy-bot"
          git config user.email "deploy@yupdar.com"
          git add public/version.txt public/index.html
          if git diff --cached --quiet; then
            echo "Нечего бампить — версия уже актуальна."
          else
            git commit -m "chore(build): bump cache version to ${NEW_VER} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YUPPAY_API_KEY: ${{ secrets.YUPPAY_API_KEY }}
          YUPPAY_WEBHOOK_SECRET: ${{ secrets.YUPPAY_WEBHOOK_SECRET }}
          TBANK_PASSWORD: ${{ secrets.TBANK_PASSWORD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: BOT_TOKEN,TELEGRAM_WEBHOOK_SECRET,YOOKASSA_SECRET_KEY,SUPABASE_SERVICE_KEY,DEEPSEEK_API_KEY,GROQ_API_KEY,YUPPAY_API_KEY,YUPPAY_WEBHOOK_SECRET,TBANK_PASSWORD,CRON_SECRET
          script: |
            cd /opt/yupdar
            git pull origin main
            upsert_env() {
              local key="$1" val="$2"
              [ -z "$val" ] && return 0
              touch .env.production
              if grep -q "^${key}=" .env.production; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env.production
              else
                echo "${key}=${val}" >> .env.production
              fi
            }
            upsert_env BOT_TOKEN "$BOT_TOKEN"
            upsert_env TELEGRAM_WEBHOOK_SECRET "$TELEGRAM_WEBHOOK_SECRET"
            upsert_env YOOKASSA_SECRET_KEY "$YOOKASSA_SECRET_KEY"
            upsert_env SUPABASE_SERVICE_KEY "$SUPABASE_SERVICE_KEY"
            upsert_env DEEPSEEK_API_KEY "$DEEPSEEK_API_KEY"
            upsert_env GROQ_API_KEY "$GROQ_API_KEY"
            upsert_env YUPPAY_API_KEY "$YUPPAY_API_KEY"
            upsert_env YUPPAY_WEBHOOK_SECRET "$YUPPAY_WEBHOOK_SECRET"
            upsert_env TBANK_PASSWORD "$TBANK_PASSWORD"
            upsert_env CRON_SECRET "$CRON_SECRET"
            docker compose -f docker-compose.yupdar.yml build --no-cache
            docker compose -f docker-compose.yupdar.yml up -d
            docker image prune -f
            echo "Deploy done: $(date)"
