<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дневник Дара — YupDar</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260608">
</head>
<body>

<div class="diary-container" id="diaryContainer">

  <!-- ═════════════ ШАПКА ═════════════ -->
  <header class="diary-header">
    <button class="diary-back" onclick="resetDiary()" aria-label="Назад">←</button>
    <div class="diary-title">
      <span class="diary-icon">📔</span>
      <span data-i18n="diary.title">Дневник Дара</span>
    </div>
    <div class="diary-streak" id="diaryStreak">
      <span class="ds-num">0</span>
      <span class="ds-label" data-i18n="diary.days">дней</span>
    </div>
  </header>

  <!-- ═════════════ СОСТОЯНИЕ A: ВВОД (3 ШКАЛЫ) ═════════════ -->
  <section class="diary-input-state" id="diaryInputState">

    <div class="diary-dar-of-day" id="diaryDarOfDay">
      <!-- SVG Дара дня + название (заполняется JS) -->
    </div>

    <div class="diary-subtitle" data-i18n="diary.subtitle">Отметь как ты — займёт 20 секунд</div>

    <!-- 1. ЭНЕРГИЯ -->
    <div class="diary-scale">
      <div class="ds-row">
        <span class="ds-label-name" data-i18n="scale.energy">Энергия</span>
        <span class="ds-hint"><span data-i18n="scale.energy_low">мало</span> → <span data-i18n="scale.energy_high">много</span></span>
      </div>
      <div id="diaryEnergy"></div>
    </div>

    <!-- 2. НАСТРОЕНИЕ -->
    <div class="diary-scale">
      <div class="ds-row">
        <span class="ds-label-name" data-i18n="scale.mood">Настроение</span>
        <span class="ds-hint"><span data-i18n="scale.mood_low">плохо</span> → <span data-i18n="scale.mood_high">хорошо</span></span>
      </div>
      <div id="diaryMood"></div>
    </div>

    <!-- 3. НАПРАВЛЕНИЕ -->
    <div class="diary-scale">
      <div class="ds-row">
        <span class="ds-label-name" data-i18n="scale.direction">К чему тянет</span>
      </div>
      <div id="diaryDirection" class="diary-direction-chips"></div>
    </div>

    <textarea
      id="diaryNote"
      class="diary-note"
      data-i18n-placeholder="diary.note_placeholder"
      placeholder="Одна строка — что зацепило за день (необязательно)"
      rows="2"
    ></textarea>

    <button class="diary-save-btn" id="diarySaveBtn" data-i18n="diary.save" disabled>
      Записать день
    </button>
  </section>

  <!-- ═════════════ СОСТОЯНИЕ B: МИНИ-ЗЕРКАЛО ═════════════ -->
  <section class="diary-mirror-state" id="diaryMirrorState" hidden>

    <div class="diary-mirror-glyph" id="diaryMirrorGlyph"><!-- SVG Дара дня --></div>

    <div class="diary-mirror-title" data-i18n="diary.mirror_title">Мини-зеркало</div>

    <div class="diary-mirror-text" id="diaryMirrorText">
      <!-- Сводка + подсказка + Дар дня -->
    </div>

    <!-- CTA на АРКА — главный конверсионный элемент -->
    <a href="/preview/arka/" class="diary-cta">
      <div class="cta-icon">🌅</div>
      <div class="cta-text">
        <div class="cta-title" data-i18n="diary.cta_title">Открой АРКА</div>
        <div class="cta-sub" data-i18n="diary.cta_sub">Глубокая работа с Даром каждый день</div>
      </div>
      <div class="cta-arrow">→</div>
    </a>

    <button class="diary-secondary-btn" onclick="resetDiary()" data-i18n="diary.tomorrow">
      Завтра приду снова
    </button>
  </section>

  <!-- ═════════════ ПОДВАЛ ═════════════ -->
  <footer class="diary-footer">
    <span data-i18n="diary.footer">YupDar · бесплатно для всех</span>
  </footer>

</div>

<!-- Фидбэк-кнопка для тестеров -->
<button class="tester-feedback-btn" onclick="openTesterFeedback()" aria-label="Фидбэк">
  💬 <span data-i18n="tester.feedback">Фидбэк</span>
</button>

<script src="/preview/js/dars.js?v=20260608"></script>
<script src="app.js?v=20260628a"></script>
</body>
</html>
